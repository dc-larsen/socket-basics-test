name: Socket Basics Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  socket-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Socket Basics scan
        uses: SocketDev/socket-basics@main
        env:
          SOCKET_ORG: david-s-github
          SOCKET_BASICS_SEVERITIES: critical,high,medium,low
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          socket_security_api_key: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          dockerfiles: Dockerfile
          trivy_vuln_enabled: true
          javascript_sast_enabled: true
          secret_scanning_enabled: true
          socket_tier_1_enabled: true
          all_rules_enabled: true
          verbose: true
